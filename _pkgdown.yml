url: https://github.com/rpahl/pipeflow


build:
  exclude:
  - "LICENSE"
  - "instructions.md"

template:
  bootstrap: 5
  bootswatch: united

authors:
  Roman Pahl:
    href: https://rpahl.github.io/r-some-blog/about.html

home:
  links:
  - text: Visit my R blog
    href: https://rpahl.github.io/r-some-blog/
  - text: Visit my R packages universe
    href: https://rpahl.r-universe.dev/packages/


reference:
- title: "Getting started"
  desc: Create a pipeline, add steps, run it, and collect results.
  contents:
  - pip_new
  - pip_add
  - pip_run
  - pip_collect_out
  - pipeflow-package

- title: "Modify steps"
  desc: Replace, rename, or remove steps; adjust tunable parameters.
  contents:
  - pip_replace
  - pip_rename
  - pip_remove
  - pip_set_params

- title: "Pipeline composition"
  desc: Combine, clone, or copy steps between pipelines.
  contents:
  - pip_add_from
  - pip_bind
  - pip_clone

- title: "Inspection and views"
  desc: Inspect the pipeline structure and create filtered views.
  contents:
  - pip_get_graph
  - pip_get_params
  - pip_has_step
  - pip_view

- title: "Locking and tagging"
  desc: Lock steps against changes or tag them for filtering.
  contents:
  - pip_lock
  - pip_unlock
  - pip_tag
  - pip_untag

- title: "S3 methods"
  desc: Generic methods for pipeflow objects.
  contents:
  - length.pipeflow_pip
  - print.pipeflow_pip
  - '[.pipeflow_pip'
  - set_log_layout



news:
  releases:
  - text: "Version 0.2.2"
    href: https://rpahl.github.io/r-some-blog/posts/2024-12-21-introducing-pipeflow/

navbar:
  structure:
    left: [home, getStarted, reference, news, articles]
    right: [github, stackoverflow, bluesky, blog]
  components:
    home:
      icon: fa-home fa-lg
      href: index.html
      aria-label: home
    getStarted:
      text: "Get Started"
      href: articles/v01-get-started.html

    articles:
      text: "Articles"
      menu:
      - text: "Overview"
        href: articles/index.html
      - text: "---"
      - text: "Get started"
      - text: "Get started with pipeflow"
        href: articles/v01-get-started.html
      - text: "Modifying existing pipelines"
        href: articles/v02-modify-pipeline.html
      - text: "Combining pipelines"
        href: articles/v03-combine-pipelines.html
      - text: "Collecting and filtering output"
        href: articles/v04-collect-output.html
      - text: ----
      - text: "Advanced"
      - text: "Split, map, and reduce"
        href: articles/v05-split-map-reduce.html
      - text: "Recursive self-modification"
        href: articles/v06-self-modify-pipeline.html
      - text: ----
      - text: "Benchmarks"
      - text: "pipeflow vs targets"
        href: articles/articles/v07-vs-targets.html


    github:
      icon: fab fa-github
      href: https://github.com/rpahl/pipeflow/
      aria-label: github
    stackoverflow:
      icon: fab fa-stack-overflow
      href: https://stackoverflow.com/users/8120617/rpahl
      aria-label: stackoverflow
    bluesky:
      icon: fab fa-bluesky
      href: https://bsky.app/profile/rpahl.bsky.social
      aria-label: bluesky
    blog:
      icon: fas fa-blog
      href: https://rpahl.github.io/r-some-blog/
      aria-label: blog
